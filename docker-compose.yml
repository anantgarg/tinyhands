services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tinyhands
      POSTGRES_USER: tinyhands
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tinyhands_default_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinyhands"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Build the agent runner image on the host Docker daemon (one-time)
  runner-build:
    image: docker:24-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker:/build:ro
    command: sh -c "docker build -t tinyhands-runner:latest /build"

  tinyhands:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runner-build:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://tinyhands:${POSTGRES_PASSWORD:-tinyhands_default_change_me}@postgres:5432/tinyhands
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Nginx reverse proxy — SSL termination for OAuth callbacks
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - tinyhands
    ports:
      - "80:80"
      - "443:443"
    environment:
      - OAUTH_DOMAIN=${OAUTH_DOMAIN:-localhost}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt

  # Certbot — automatic certificate renewal every 12 hours
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:
  certbot-etc:
  certbot-var:
