name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run unit tests with coverage
        run: npx vitest run tests/unit/ --coverage
      - name: Enforce coverage thresholds
        run: |
          node -e "
            const summary = require('./coverage/coverage-summary.json');
            const thresholds = { lines: 80, branches: 80, functions: 90 };
            let failed = false;
            for (const [key, min] of Object.entries(thresholds)) {
              const actual = summary.total[key].pct;
              if (actual < min) {
                console.error('FAIL ' + key + ': ' + actual + '% < ' + min + '%');
                failed = true;
              } else {
                console.log('PASS ' + key + ': ' + actual + '% >= ' + min + '%');
              }
            }
            if (failed) process.exit(1);
          "
      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const { lines, branches, functions, statements } = summary.total;
            const body = [
              '## Test Coverage Report',
              '',
              '| Metric | Coverage | Threshold |',
              '|--------|----------|-----------|',
              `| Lines | ${lines.pct}% (${lines.covered}/${lines.total}) | 80% |`,
              `| Branches | ${branches.pct}% (${branches.covered}/${branches.total}) | 80% |`,
              `| Functions | ${functions.pct}% (${functions.covered}/${functions.total}) | 90% |`,
              `| Statements | ${statements.pct}% (${statements.covered}/${statements.total}) | — |`,
              '',
              `> Generated by CI on \`${process.env.GITHUB_SHA?.slice(0, 7)}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('## Test Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --config vitest.integration.config.ts
        env:
          REDIS_URL: redis://localhost:6379

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t tinyhands-agent:test ./docker
