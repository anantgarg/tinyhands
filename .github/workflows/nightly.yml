name: Nightly Smoke Tests

on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run unit tests with coverage
        run: npx vitest run tests/unit/ --coverage
      - name: Enforce coverage thresholds
        run: |
          node -e "
            const summary = require('./coverage/coverage-summary.json');
            const thresholds = { lines: 80, branches: 80, functions: 90 };
            let failed = false;
            for (const [key, min] of Object.entries(thresholds)) {
              const actual = summary.total[key].pct;
              if (actual < min) {
                console.error('FAIL ' + key + ': ' + actual + '% < ' + min + '%');
                failed = true;
              } else {
                console.log('PASS ' + key + ': ' + actual + '% >= ' + min + '%');
              }
            }
            if (failed) process.exit(1);
          "
      - run: npx vitest run --config vitest.integration.config.ts
        env:
          REDIS_URL: redis://localhost:6379
      - run: docker build -t tinyjobs-agent:smoke ./docker
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage-report
          path: coverage/
          retention-days: 30
